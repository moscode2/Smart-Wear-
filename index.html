<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Smart Wear Collection — elegant ladies' dresses, gowns and outfits in Kenya. Pay with M-Pesa or direct bank deposit." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;0,800;1,500;1,600&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <title>Smart Wear Collection | Ladies' Fashion Boutique</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      
      if ("%MODE%" === "development") {
        // Send to logger and notify parent
        const sendError = (error) => {
          if (!error?.message) return; // only log errors with a message

          fetch("/@chariot-logger", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(error),
          }).catch(() => {});
          window.parent.postMessage("error", "*");
        };

        // Catch all errors
        window.addEventListener("error", (e) => sendError(e), true);
        window.addEventListener(
          "unhandledrejection",
          (e) => sendError(e),
          true
        );

        // Catch console.error
        const originalError = console.error;
        console.error = function (...args) {
          originalError.apply(console, args);
          sendError({ type: "console", args });
        };
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
